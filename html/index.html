<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDE Emotes</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app" class="hidden">

  <!-- Sidebar Navigation -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="rde-logo">
        <span class="logo-dragon">🐉</span>
        <div class="logo-text">
          <span class="logo-title">RDE</span>
          <span class="logo-sub">EMOTES</span>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Emotes suchen..." autocomplete="off" spellcheck="false" />
      <button id="searchClear" class="search-clear hidden">✕</button>
    </div>

    <!-- Categories -->
    <nav id="catNav">
      <button class="cat-btn active" data-cat="favorites">
        <span class="cat-icon">❤️</span>
        <span class="cat-label">Favoriten</span>
        <span class="cat-count" id="cnt-favorites">0</span>
      </button>
      <!-- Dynamic categories injected by JS -->
    </nav>

    <!-- Stop Button -->
    <div class="sidebar-footer">
      <button id="stopBtn" class="stop-btn">
        <span>⬛</span> Emote stoppen
      </button>
      <button id="closeBtn" class="close-btn">
        <span>✕</span> Schließen
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="content">
    <div class="content-header">
      <h2 id="contentTitle">Favoriten</h2>
      <span id="contentCount" class="content-count">0 Emotes</span>
    </div>

    <!-- Emote Grid -->
    <div id="emoteGrid" class="emote-grid">
      <!-- Populated by JS -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">🎭</div>
      <p id="emptyMsg">Keine Emotes gefunden</p>
    </div>
  </main>

  <!-- Active Emote Indicator -->
  <div id="activeBar" class="active-bar hidden">
    <span class="active-dot"></span>
    <span id="activeLabel">Kein Emote aktiv</span>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
